version: "3.9"

services:

  # ─── Kafka (KRaft mode - no Zookeeper needed) ───────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: kafka-topics.sh --bootstrap-server localhost:9092 --list
      interval: 10s
      timeout: 10s
      retries: 10

  # ─── Redis (with Redis Stack for geo commands) ───────────────────────────────
  redis:
    image: redis/redis-stack:latest
    container_name: redis
    ports:
      - "6379:6379"
      - "8001:8001"
    volumes:
      - redis-data:/data
    healthcheck:
      test: redis-cli ping
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ridedb}
      POSTGRES_USER: ${POSTGRES_USER:-rideuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ridepass}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: pg_isready -U ${POSTGRES_USER:-rideuser}
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Stream Processor ────────────────────────────────────────────────────────
  stream-processor:
    build: ./stream-processor
    container_name: stream-processor
    ports:
      - "8001:8001"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_HOST: redis
      REDIS_PORT: 6379
      POSTGRES_DSN: postgresql://${POSTGRES_USER:-rideuser}:${POSTGRES_PASSWORD:-ridepass}@postgres:5432/${POSTGRES_DB:-ridedb}
      MATCHING_RADIUS_KM: ${MATCHING_RADIUS_KM:-5}
      DRIVER_TTL_SECONDS: ${DRIVER_TTL_SECONDS:-120}
      MATCH_TIMEOUT_SECONDS: ${MATCH_TIMEOUT_SECONDS:-30}
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ─── API Server (Flask) ───────────────────────────────────────────────────────
  api-server:
    build: ./api-server
    container_name: api-server
    ports:
      - "5000:5000"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_HOST: redis
      REDIS_PORT: 6379
      POSTGRES_DSN: postgresql://${POSTGRES_USER:-rideuser}:${POSTGRES_PASSWORD:-ridepass}@postgres:5432/${POSTGRES_DB:-ridedb}
      JWT_SECRET: ${JWT_SECRET}
      FLASK_ENV: ${FLASK_ENV:-development}
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ─── Event Generator ──────────────────────────────────────────────────────────
  event-generator:
    build: ./event-generator
    container_name: event-generator
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      NUM_DRIVERS: ${NUM_DRIVERS:-200}
      RIDE_RATE_PER_SEC: ${RIDE_RATE_PER_SEC:-10}
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  # ─── Prometheus ───────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - stream-processor
      - api-server

  # ─── Grafana ──────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  kafka-data:
  redis-data:
  postgres-data:
  grafana-data:
